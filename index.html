<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1 class="app-title">Vocab</h1>
      <button class="profile-btn" id="profileBtn" aria-label="Settings">⚙</button>
    </header>

    <main>
      <div class="card">
        <button class="nav-arrow nav-arrow--prev" id="prevArrow" aria-label="Previous">‹</button>
        <button class="nav-arrow nav-arrow--next" id="nextArrow" aria-label="Next">›</button>

        <div class="card-counter" id="counter">
          <span id="counterText">1 / 100</span>
          <span class="cycle-dot hidden" id="cycleDot"></span>
        </div>

        <div class="card-body">
          <div class="word-level hidden" id="wordLevel"></div>
          <h2 class="word" id="word">Loading...</h2>
          <p class="definition" id="definition"></p>

          <button class="reveal-btn" id="revealBtn">Show etymology &amp; example</button>

          <div class="extras hidden" id="extras">
            <p class="etymology" id="etymology"></p>
            <p class="example" id="example"></p>
          </div>
        </div>

        <div class="actions">
          <button class="action-btn" id="btnStar" title="Star this word">
            <span class="icon">☆</span>
            <span class="label">Star</span>
          </button>
          <button class="action-btn" id="btnMemorize" title="Add to memorize list">
            <span class="icon">📌</span>
            <span class="label">Memorize</span>
          </button>
          <button class="action-btn" id="btnKnown" title="Mark as known">
            <span class="icon">✓</span>
            <span class="label">Known</span>
          </button>
        </div>
      </div>

      <div class="empty-state hidden" id="emptyState">
        <p>No words here yet.</p>
        <p class="empty-hint">Open settings and choose a different list, or tag some words first.</p>
      </div>
    </main>

    <div class="sheet-backdrop hidden" id="sheetBackdrop"></div>

    <div class="profile-sheet" id="profileSheet" aria-modal="true" role="dialog">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <h2 class="sheet-title">Settings</h2>
        <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
      </div>

      <div class="sheet-body">
        <section class="sheet-section">
          <h3 class="sheet-label">Home word list</h3>
          <div class="sheet-options" id="homeListOptions">
            <button class="sheet-option active" data-list="beginner">Beginner</button>
            <button class="sheet-option" data-list="intermediate">Intermediate</button>
            <button class="sheet-option" data-list="advanced">Advanced</button>
            <button class="sheet-option" data-list="star">Starred</button>
            <button class="sheet-option" data-list="memorize">Memorize</button>
            <button class="sheet-option" data-list="known">Known</button>
          </div>
        </section>

        <section class="sheet-section">
          <h3 class="sheet-label">Auto-cycle speed</h3>
          <div class="speed-picker">
            <div class="speed-fields">
              <label class="speed-field">
                <input type="number" id="speedDays" min="0" max="59" value="0" />
                <span>d</span>
              </label>
              <label class="speed-field">
                <input type="number" id="speedHours" min="0" max="59" value="0" />
                <span>h</span>
              </label>
              <label class="speed-field">
                <input type="number" id="speedMins" min="0" max="59" value="0" />
                <span>m</span>
              </label>
              <label class="speed-field">
                <input type="number" id="speedSecs" min="0" max="59" value="10" />
                <span>s</span>
              </label>
            </div>
            <button class="speed-off-btn" id="cycleOffBtn">Off</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
